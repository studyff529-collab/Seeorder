<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Product Links</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5}
        .header{background:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,.05);position:sticky;top:0;z-index:100}
        .header h1{font-size:20px;color:#333}
        .btn-add{background:#ccc;color:#666;border:none;padding:10px 25px;border-radius:10px;font-size:16px;cursor:not-allowed;font-weight:600}
        .content{padding:20px}
        .card{background:#fff;border-radius:15px;padding:25px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .saved-products{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid #f0f0f0}
        .saved-products h3{font-size:20px;color:#333}
        .badge{background:#667eea;color:#fff;padding:5px 12px;border-radius:20px;font-size:14px}
        .empty-state{text-align:center;padding:40px 20px;color:#999}
        .empty-state svg{width:80px;height:80px;margin-bottom:20px;fill:#bbb}
        .product-list{display:flex;flex-direction:column;gap:15px}
        .product-card{background:#e8f5e9;border:2px solid #4caf50;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .3s}
        .product-card:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(76,175,80,.3)}
        .product-card-header{padding:15px 20px;display:flex;align-items:center;gap:15px}
        .product-image{width:70px;height:70px;border-radius:8px;object-fit:cover;background:#ddd;flex-shrink:0}
        .product-info{flex:1;min-width:0}
        .product-info h4{font-size:16px;color:#333;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .product-info .price{font-size:18px;color:#667eea;font-weight:700;margin-bottom:3px}
        .product-info .preview-text{font-size:13px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .product-actions{display:flex;align-items:center;gap:10px}
        .expand-icon{font-size:20px;color:#667eea;transition:transform .3s;flex-shrink:0}
        .product-card.expanded .expand-icon{transform:rotate(180deg)}
        .btn-delete{background:#f5576c;color:#fff;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;font-size:18px}
        .btn-delete:hover{background:#d63030}
        .product-details{max-height:0;overflow:hidden;transition:max-height .5s ease-out;background:#fff}
        .product-card.expanded .product-details{max-height:2000px}
        .product-details-content{padding:20px;border-top:2px solid #4caf50}
        .detail-row{margin-bottom:15px}
        .detail-label{font-size:12px;color:#666;text-transform:uppercase;font-weight:600;margin-bottom:5px}
        .detail-value{font-size:15px;color:#333;word-break:break-word;line-height:1.6}
        .detail-value.link{background:#e8f4ff;padding:10px;border-radius:8px;border-left:4px solid #667eea;word-break:break-all}
        .detail-value.category{display:inline-block;background:#667eea;color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;text-transform:capitalize}
        .detail-value.full-details{white-space:pre-wrap;word-break:break-word}
        .full-image{width:100%;max-height:400px;object-fit:contain;border-radius:8px;margin-bottom:15px;background:#f9f9f9}
        .back-btn{position:fixed;top:15px;left:15px;background:#fff;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;font-weight:600;text-decoration:none;color:#333;font-size:14px}
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <div class="header">
        <h1>Manage Product Links</h1>        <button class="btn-add" title="Edit code to add products">+ Add</button>
    </div>
    <div class="content">
        <div class="card">
            <div class="saved-products">
                <h3>Saved Products</h3>
                <span class="badge" id="productCount">0</span>
            </div>
            <div class="product-list" id="productList"></div>
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/><path d="M7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/></svg>
                <p><strong>No products yet</strong></p>
                <p>Edit PRODUCTS array in code to add products</p>
            </div>
        </div>
    </div>

    <script>
        const PRODUCTS = [
            {id:1,link:"https://studyff529-collab.github.io/Shoppingapp/fashion.html?product=1",price:"287",details:"Shirt,, SHIRT, imported popcorn febric shirt, PRINTED shirt, casual shirt, formal shirt, party wear shirt, shirt for men, shirts, shirts for mens, office shirt, full sleeve shirt, solid shirt Men kurta type Shirts.M 1",image:"mm.jpg",category:"fashion"},
            {id:2,link:"https://studyff529-collab.github.io/Shoppingapp/electronics.html?product=1",price:"398",details:"Brandnded Ring Diamonds Calender Silicone Strap Casual Business Versatile Jewellery boys and men 's Luxury Quartz Watches couple watch.M 2",image:"mn.jpg",category:"electronics"},
            {id:3,link:"https://studyff529-collab.github.io/Shoppingapp/electronics.html?product=2",price:"349",details:"Daniel Radcliffe Men's Watch, Boys Watch, Gift for Men and Boys.M 3",image:"nn.jpg",category:"electronics"},
            {id:4,link:"https://studyff529-collab.github.io/Shoppingapp/fashion.html?product=2",price:"396",details:"AADITRI MENS SHIRT/MENS SHIRTS-BEST SELLERS/MEN FASHION/SHIRTS/CASUAL WEAR-MEN/CHEKED SHIRTS/MENS TOP WEAR/SHIRT UNDER 299/REGULAR SIZE SHIR...Read More.M 4",image:"gg.jpg",category:"fashion"},
            {id:5,link:"https://studyff529-collab.github.io/Shoppingapp/kids.html?product=1",price:"174",details:"100 pcs building toys.M 5",image:"qq.jpg",category:"kids"},
            {id:6,link:"https://studyff529-collab.github.io/Shoppingapp/home.html?product=1",price:"116",details:"Divine Designs Radha Krishna Flowers & Jhoomar Wall Sticker.M 6",image:"ww.jpg",category:"home"},
            {id:7,link:".....",price:"523",details:"Remote control car, Monster truck.M 7",image:"tt.jpg",category:"electronics"},
        ];

        let products = JSON.parse(localStorage.getItem('products')) || [];

        function init(){
            if(PRODUCTS.length>0){localStorage.setItem('products',JSON.stringify(PRODUCTS));products=[...PRODUCTS];}
            updateCount();render();
        }

        function updateCount(){document.getElementById('productCount').textContent=products.length;}

        function render(){
            const list=document.getElementById('productList');
            const empty=document.getElementById('emptyState');
            if(products.length===0){list.innerHTML='';empty.style.display='block';return;}
            empty.style.display='none';
            list.innerHTML=products.map(p=>`
                <div class="product-card" data-id="${p.id}" onclick="toggle('${p.id}')">
                    <div class="product-card-header">
                        <img src="${p.image||'image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiPjxwYXRoIGQ9Ik0yMSAxOXYtMWMwLTEuMS0uOS0yLTItMmgtNHYtMmgtMnYySDVjLTEuMSAwLTItLjktMi0ydjFjMCAxLjEuOSAyIDIgMmgxNGMxLjEgMCAyLS45IDItMnoiLz48L3N2Zz4='}" class="product-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiPjxwYXRoIGQ9Ik0yMSAxOXYtMWMwLTEuMS0uOS0yLTItMmgtNHYtMmgtMnYySDVjLTEuMSAwLTItLjktMi0ydjFjMCAxLjEuOSAyIDIgMmgxNGMxLjEgMCAyLS45IDItMnoiLz48L3N2Zz4='">
                        <div class="product-info">
                            <h4>${(p.details||'Product').split(',')[0].substring(0,50)}${(p.details||'').length>50?'...':''}</h4>
                            <div class="price">₹${p.price||'0'}</div>
                            <div class="preview-text">${p.details||''}</div>
                        </div>                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="product-details" id="d-${p.id}">
                        <div class="product-details-content">
                            ${p.image?`<img src="${p.image}" class="full-image" onerror="this.style.display='none'">`:''}
                            <div class="detail-row"><div class="detail-label">Category</div><span class="detail-value category">${p.category||'general'}</span></div>
                            <div class="detail-row"><div class="detail-label">Full Details</div><div class="detail-value full-details">${p.details||''}</div></div>
                            <div class="detail-row"><div class="detail-label">Price</div><div class="detail-value" style="font-size:24px;color:#667eea;font-weight:bold">₹${p.price||'0'}</div></div>
                            <div class="detail-row"><div class="detail-label">Product Link</div><div class="detail-value link">${p.link||''}</div></div>
                            <div class="detail-row"><div class="detail-label">Product ID</div><div class="detail-value">#${p.id}</div></div>
                        </div>
                    </div>
                </div>`).join('');
        }

        function toggle(id){
            const card=document.querySelector(`[data-id="${id}"]`);
            if(card){
                card.classList.toggle('expanded');
                const details=document.getElementById(`d-${id}`);
                if(details){
                    details.style.maxHeight=card.classList.contains('expanded')?'2000px':'0';
                }
            }
        }

        function del(e,id){e.stopPropagation();if(confirm('Delete this product?')){products=products.filter(p=>p.id!=id);localStorage.setItem('products',JSON.stringify(products));updateCount();render();}}

        window.addEventListener('load',init);
    </script>
</body>
</html>
